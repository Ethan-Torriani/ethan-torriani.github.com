<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavoro di Geografia - Ethan Bianchini</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #f1f5f9;
}

header { padding: 40px 20px; text-align: center; background: linear-gradient(180deg, #1e293b, #0f172a); }

h1 { margin: 0; font-size: 28px; }

.subtitle { opacity: 0.7; margin-top: 10px; }

.container { padding: 20px; max-width: 900px; margin: auto; }

.card { background: #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.2s; }

.card:hover { transform: scale(1.02); }

.card.active { border: 2px solid #38bdf8; box-shadow: 0 0 20px rgba(56,189,248,0.3); }

.day { font-weight: bold; margin-bottom: 10px; color: #38bdf8; }

button { margin-top: 10px; padding: 10px 15px; border-radius: 10px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }

button:hover { background: #7dd3fc; }

.hidden { display: none; }

footer { text-align: center; padding: 20px; opacity: 0.6; font-size: 14px; }

/* MAP SECTION */
.map-section {
  margin-bottom: 30px;
}

.map-section h2 {
  font-size: 20px;
  margin-bottom: 14px;
  color: #38bdf8;
}

#map {
  height: 420px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  border: 1px solid #2d3f55;
}

/* Custom Leaflet dark popup */
.leaflet-popup-content-wrapper {
  background: #1e293b !important;
  color: #f1f5f9 !important;
  border-radius: 14px !important;
  border: 1px solid #38bdf8 !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
}

.leaflet-popup-tip {
  background: #38bdf8 !important;
}

.leaflet-popup-content {
  margin: 12px 16px !important;
}

.popup-day { font-size: 11px; color: #38bdf8; font-weight: bold; margin-bottom: 4px; }
.popup-title { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.popup-desc { font-size: 13px; opacity: 0.8; }

/* Attribution override */
.leaflet-control-attribution {
  background: rgba(15,23,42,0.8) !important;
  color: #94a3b8 !important;
}

.leaflet-control-attribution a { color: #38bdf8 !important; }

@media (min-width: 768px) { h1 { font-size: 36px; } .container { padding: 40px; } }
</style>
</head>
<body>

<header>
  <h1>Lavoro di Geografia</h1>
  <div class="subtitle">Una vera esperienza italiana</div>
</header>

<div class="container">

  <!-- MAP -->
  <div class="map-section card">
    <div class="day">🗺️ Mappa Interattiva</div>
    <p style="margin-top:0; margin-bottom:14px; opacity:0.8;">Clicca sui segnaposto per scoprire ogni tappa del viaggio.</p>
    <div id="map"></div>
  </div>

  <!-- ITINERARY CARDS -->
  <div id="itinerary"></div>

</div>

<footer>
  Creato da Ethan Bianchini
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const data = [
  {
    day: "Giorno 1",
    title: "Civita di Bagnoregio",
    desc: "Un borgo sospeso nel tempo, raggiungibile solo a piedi.",
    extra: "Passeggia tra vicoli silenziosi e goditi un tramonto irreale.",
    lat: 42.6275,
    lng: 12.1136
  },
  {
    day: "Giorno 2",
    title: "Castelmezzano",
    desc: "Tra le Dolomiti Lucane, uno dei borghi più scenografici.",
    extra: "Prova il Volo dell'Angelo se hai coraggio.",
    lat: 40.5282,
    lng: 16.0500
  },
  {
    day: "Giorno 3",
    title: "Dozza",
    desc: "Un museo a cielo aperto fatto di murales.",
    extra: "Ogni casa è un'opera d'arte diversa.",
    lat: 44.3269,
    lng: 11.6308
  },
  {
    day: "Giorno 4",
    title: "Sabbioneta",
    desc: "Città rinascimentale perfettamente conservata.",
    extra: "Atmosfera super chill e super storica allo stesso tempo.",
    lat: 44.9986,
    lng: 10.4902
  },
  {
    day: "Giorno 5",
    title: "Brisighella",
    desc: "Borgo medievale tra colline e ulivi.",
    extra: "Prova l'olio locale e sali sulla torre panoramica.",
    lat: 44.2200,
    lng: 11.7716
  },
  {
    day: "Giorno 6",
    title: "Apricale",
    desc: "Piccolo villaggio ligure pieno di vibe artistiche.",
    extra: "Stradine strette e atmosfera super cozy.",
    lat: 43.8806,
    lng: 7.6667
  },
  {
    day: "Giorno 7",
    title: "Orta San Giulio",
    desc: "Un lago tranquillo lontano dal turismo di massa.",
    extra: "Perfetto per chiudere il viaggio in pace totale.",
    lat: 45.7986,
    lng: 8.4175
  }
];

// ── MAP INIT ──────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([43.5, 12.0], 6);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Custom marker icon
function makeIcon(number) {
  return L.divIcon({
    className: '',
    html: `<div style="
      width:32px; height:32px; border-radius:50%;
      background:#38bdf8; color:#0f172a;
      display:flex; align-items:center; justify-content:center;
      font-weight:bold; font-size:14px;
      border:3px solid #0f172a;
      box-shadow:0 2px 8px rgba(0,0,0,0.6);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    ">${number}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  });
}

const markers = [];

data.forEach((item, i) => {
  const marker = L.marker([item.lat, item.lng], { icon: makeIcon(i + 1) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-day">${item.day}</div>
      <div class="popup-title">${item.title}</div>
      <div class="popup-desc">${item.desc}</div>
    `);

  marker.on('click', () => {
    // Highlight the matching card
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById(`card-${i}`);
    if (card) {
      card.classList.add('active');
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  markers.push(marker);
});

// Draw a polyline connecting the stops
const latlngs = data.map(d => [d.lat, d.lng]);
L.polyline(latlngs, {
  color: '#38bdf8',
  weight: 2,
  opacity: 0.5,
  dashArray: '6 6'
}).addTo(map);

// ── CARDS ─────────────────────────────────────────────────
const container = document.getElementById("itinerary");

data.forEach((item, index) => {
  const card = document.createElement("div");
  card.className = "card";
  card.id = `card-${index}`;

  card.innerHTML = `
    <div class="day">${item.day}</div>
    <h2>${item.title}</h2>
    <p>${item.desc}</p>
    <button onclick="toggle(${index})">Scopri di più</button>
    <button onclick="focusMap(${index})" style="margin-left:8px; background:#1e3a5f; color:#38bdf8; border:1px solid #38bdf8;">📍 Vedi sulla mappa</button>
    <p id="extra-${index}" class="hidden">${item.extra}</p>
  `;

  container.appendChild(card);
});

function toggle(index) {
  const el = document.getElementById(`extra-${index}`);
  el.classList.toggle("hidden");
}

function focusMap(index) {
  const item = data[index];
  map.flyTo([item.lat, item.lng], 12, { duration: 1.2 });
  markers[index].openPopup();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Also highlight card
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById(`card-${index}`).classList.add('active');
}
</script>
</body>
</html>
